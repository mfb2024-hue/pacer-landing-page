name: PACER Blog Automation
 
on:
  schedule:
    - cron: '0 */8 * * *'   # every 8 hours = 3 runs/day = 21 posts/day
  workflow_dispatch:
    inputs:
      posts_count:
        description: 'Number of posts to generate'
        required: false
        default: '7'
 
jobs:
  generate-posts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      - name: Run blog engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTS_PER_RUN: ${{ github.event.inputs.posts_count || '7' }}
        run: python blog_engine.py
